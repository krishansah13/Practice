<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To-Do List By Krishan Kumar Sah </title>
    <link rel="stylesheet" href="css/styles.css">
</head>

<body>
    <!-- heading -->
    <header>
        <center>
            <h1>
                To Do List Application
            </h1>
        </center>
    </header>

    <!-- Taking the input from the user about the task they have in mind -->
    <div id = "takingInput">
        <label for="taskToBeDone">
            Enter the task you have in mind :
        </label>

        <input type="text" name="taskToBeDone" placeholder="type here..." id = "inputTaker">

        <button type="submit" id="submitTask">
            Submit
        </button>
    </div>

    <!--  All the tasks will be displayed here  -->
    <div id="tasks"></div>

    <!-- connecting the final javascript portion in here! -->
    <script src="js/script.js"></script>
</body>

</html>
